<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── Page background ── */
body{
  min-height:100vh;
  background:radial-gradient(ellipse at top, #0a1628 0%, #040810 100%);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1.5rem 1rem;
  font-family:'Segoe UI',system-ui,sans-serif;
}

/* ══════════════════════════════════
   PLAYER CARD — FIFA STYLE
══════════════════════════════════ */
.card-wrap{
  perspective:1000px;
  cursor:pointer;
}
.card-wrap:hover .card-inner{
  transform:rotateY(8deg) rotateX(-3deg);
}
.card-inner{
  transition:transform .3s ease;
  transform-style:preserve-3d;
}

.player-card{
  width:300px;
  position:relative;
  border-radius:18px;
  overflow:hidden;
  box-shadow:
    0 0 0 2px rgba(255,255,255,0.08),
    0 25px 60px rgba(0,0,0,0.7),
    0 0 80px var(--glow,rgba(192,192,192,0.15));
  background:var(--card-bg, linear-gradient(160deg,#2a2a2a,#1a1a1a));
  transition:box-shadow .3s;
}

/* ── Frame glow ikut level ── */
.card-unverified  { --card-bg:linear-gradient(160deg,#2a2a2a,#1a1a1a); --glow:rgba(200,200,200,.1); --border:#555; }
.card-silver      { --card-bg:linear-gradient(160deg,#3a3f4a,#1e2229); --glow:rgba(192,215,255,.25); --border:#7a9cc5; }
.card-bronze      { --card-bg:linear-gradient(160deg,#4a2e1a,#2a1a0a); --glow:rgba(205,127,50,.3);  --border:#cd7f32; }
.card-green       { --card-bg:linear-gradient(160deg,#1a3a1a,#0a2010); --glow:rgba(0,200,80,.3);    --border:#00c850; }
.card-blue        { --card-bg:linear-gradient(160deg,#0a1e3a,#060f1f); --glow:rgba(30,100,255,.35); --border:#1e64ff; }
.card-purple      { --card-bg:linear-gradient(160deg,#1e0a3a,#100520); --glow:rgba(160,80,255,.4);  --border:#a050ff; }
.card-gold        { --card-bg:linear-gradient(160deg,#3a2800,#1e1400); --glow:rgba(255,200,0,.45);  --border:#ffc800; }
.card-black_gold  { --card-bg:linear-gradient(160deg,#1a1200,#0a0800); --glow:rgba(255,180,0,.5);   --border:#ffb400; }

/* ── Card border frame ── */
.card-frame{
  position:absolute;inset:0;
  border-radius:18px;
  border:2px solid var(--border,#555);
  pointer-events:none;
  z-index:10;
}
/* Gold/Black-Gold shimmer animation */
.card-gold .card-frame,
.card-black_gold .card-frame{
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{
  0%  { border-color: #ffc800; box-shadow:inset 0 0 20px rgba(255,200,0,.2); }
  50% { border-color: #ffe566; box-shadow:inset 0 0 30px rgba(255,229,102,.35); }
  100%{ border-color: #ffc800; box-shadow:inset 0 0 20px rgba(255,200,0,.2); }
}

/* ── Top section (DNA + logos) ── */
.card-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 14px 0;
  position:relative;z-index:2;
}

.dna-block{
  display:flex;flex-direction:column;align-items:flex-start;
  line-height:1;
}
.dna-score{
  font-size:3rem;font-weight:900;
  color:var(--border,#ccc);
  text-shadow:0 0 20px var(--glow,rgba(255,255,255,.2));
  line-height:1;
}
.dna-pos{
  font-size:.9rem;font-weight:800;
  color:rgba(255,255,255,.7);
  letter-spacing:.1em;
  margin-top:2px;
}

.logos-block{
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;
}
.logo-badge{
  width:40px;height:40px;
  border-radius:8px;
  object-fit:contain;
  background:rgba(255,255,255,.08);
  padding:4px;
  border:1px solid rgba(255,255,255,.12);
}
.logo-text{
  font-size:.55rem;font-weight:700;
  color:rgba(255,255,255,.5);
  text-align:center;
  letter-spacing:.05em;
  text-transform:uppercase;
  max-width:44px;
  line-height:1.2;
}
.state-emoji{
  font-size:1.6rem;
  line-height:1;
  text-align:center;
}

/* ── Player photo ── */
.card-photo-wrap{
  position:relative;
  margin:6px 14px 0;
  height:200px;
  overflow:hidden;
  border-radius:10px;
}
.card-photo{
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
}
.card-photo-placeholder{
  width:100%;height:100%;
  background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;color:rgba(255,255,255,.2);
}
/* Gradient overlay bawah photo */
.card-photo-wrap::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:60%;
  background:linear-gradient(to top, var(--card-bg-end,#1a1a1a) 0%, transparent 100%);
}

/* ── Player name + passport ── */
.card-name-block{
  padding:8px 14px 4px;
  text-align:center;
  position:relative;z-index:2;
}
.card-name{
  font-size:1.1rem;font-weight:900;
  color:#fff;
  letter-spacing:.05em;
  text-transform:uppercase;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
}
.card-passport{
  font-size:.62rem;font-weight:600;
  color:var(--border,#888);
  letter-spacing:.12em;
  margin-top:2px;
  font-family:monospace;
}

/* ── Divider ── */
.card-divider{
  margin:6px 14px;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--border,#555), transparent);
}

/* ── Stats grid ── */
.card-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px 12px;
  padding:6px 18px 16px;
  position:relative;z-index:2;
}
.stat-item{
  display:flex;align-items:baseline;gap:5px;
}
.stat-val{
  font-size:1.05rem;font-weight:900;
  color:var(--border,#ccc);
  min-width:28px;
  text-shadow:0 0 10px var(--glow,rgba(255,255,255,.1));
}
.stat-lbl{
  font-size:.65rem;font-weight:700;
  color:rgba(255,255,255,.55);
  letter-spacing:.08em;
}

/* ── KYC badge ── */
.kyc-badge{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);
  border:1px solid var(--border,#555);
  border-radius:999px;
  padding:.15rem .6rem;
  font-size:.55rem;font-weight:700;
  color:var(--border,#888);
  letter-spacing:.1em;
  text-transform:uppercase;
  z-index:11;
}

/* ── Watermark ── */
.card-watermark{
  text-align:center;
  padding-bottom:10px;
  font-size:.5rem;
  color:rgba(255,255,255,.2);
  letter-spacing:.15em;
  font-weight:700;
  text-transform:uppercase;
}

/* ── Action buttons ── */
.actions{
  margin-top:1.25rem;
  display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;
}
.btn-share{
  background:linear-gradient(90deg,#00d4aa,#00b341);
  color:#fff;border:none;border-radius:999px;
  padding:.6rem 1.4rem;font-size:.82rem;font-weight:700;
  cursor:pointer;transition:.15s;
  box-shadow:0 4px 15px rgba(0,200,130,.3);
}
.btn-share:hover{opacity:.88;transform:translateY(-2px)}
.btn-download{
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);
  border-radius:999px;padding:.6rem 1.4rem;
  font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s;
}
.btn-download:hover{background:rgba(255,255,255,.14)}

/* ── Info below card ── */
.card-info{
  margin-top:1rem;
  text-align:center;
  font-size:.72rem;color:rgba(255,255,255,.3);
}
.card-info a{
  color:#00d4aa;text-decoration:none;font-weight:600;
}

/* ── Not found state ── */
.not-found{
  text-align:center;color:rgba(255,255,255,.5);
  padding:2rem;
}
.not-found h2{font-size:1.2rem;color:#fff;margin-bottom:.5rem}
.not-found p{font-size:.82rem;margin-bottom:1rem}
.not-found a{
  display:inline-block;background:#00b341;color:#fff;
  border-radius:999px;padding:.6rem 1.4rem;
  text-decoration:none;font-weight:700;font-size:.82rem;
}

/* ── Loading ── */
.loading{
  color:rgba(255,255,255,.4);font-size:.9rem;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>
</head>
<body>

<div id="app"><div class="loading">⚽ Memuatkan passport...</div></div>

<script>
'use strict';

// ── Supabase ──────────────────────────────────────────────────
const _SB = supabase.createClient(
  window.PLAYPRO_SUPABASE_URL,
  window.PLAYPRO_SUPABASE_ANON_KEY
);

// ── State kod negeri Malaysia ─────────────────────────────────
const STATE_MAP = {
  '01':'Johor','02':'Kedah','03':'Kelantan','04':'Melaka',
  '05':'N.Sembilan','06':'Pahang','07':'P.Pinang','08':'Perak',
  '09':'Perlis','10':'Selangor','11':'Terengganu','12':'Sabah',
  '13':'Sarawak','14':'WP KL','15':'WP Labuan','16':'WP Putrajaya'
};

// Emoji lambang negeri (simplified)
const STATE_EMOJI = {
  '01':'🦁','02':'🌾','03':'🌙','04':'🏛️',
  '05':'🐃','06':'🐘','07':'🌉','08':'⛏️',
  '09':'👑','10':'🌺','11':'🐢','12':'🦅',
  '13':'🐱','14':'🗼','15':'⚓','16':'🏛️'
};

// ── Frame class map ───────────────────────────────────────────
const FRAME_LABEL = {
  unverified: 'Belum Verify',
  silver:     'Verified',
  bronze:     'Amateur',
  green:      'Rising Star',
  blue:       'Semi-Pro',
  purple:     'Professional',
  gold:       'Elite',
  black_gold: 'Legend'
};

// ── Position short label ──────────────────────────────────────
function posLabel(pos){
  const map = {
    goalkeeper:'GK', defender:'DEF',
    midfielder:'MID', forward:'FWD'
  };
  return map[pos] || pos?.toUpperCase() || '—';
}

// ── Extract state code dari IC ────────────────────────────────
function stateFromIC(ic){
  if(!ic) return null;
  const clean = ic.replace(/[^0-9]/g,'');
  return clean.length >= 8 ? clean.substring(6,8) : null;
}

// ── Load player data ──────────────────────────────────────────
async function loadPlayer(passportNo){
  const { data, error } = await _SB
    .from('players')
    .select(`
      id, full_name, date_of_birth, position,
      photo_url, passport_number, passport_frame,
      kyc_status, ic_number,
      dna_overall, dna_technical, dna_physical,
      dna_mental, dna_tactical, dna_goalkeeper,
      club_id,
      clubs:club_id (id, name, logo_url)
    `)
    .eq('passport_number', passportNo)
    .single();

  return { data, error };
}

// ── Render card ───────────────────────────────────────────────
function renderCard(p){
  const frame  = p.passport_frame || 'unverified';
  const stCode = stateFromIC(p.ic_number);
  const stName = stCode ? (STATE_MAP[stCode] || 'Malaysia') : 'Malaysia';
  const stEmoji= stCode ? (STATE_EMOJI[stCode] || '🇲🇾') : '🇲🇾';
  const club   = p.clubs;
  const posLbl = posLabel(p.position);

  // DNA values
  const dnaOverall = p.dna_overall ?? '—';
  const dnaTech    = p.dna_technical  ?? '—';
  const dnaPhys    = p.dna_physical   ?? '—';
  const dnaMent    = p.dna_mental     ?? '—';
  const dnaTact    = p.dna_tactical   ?? '—';
  const dnaGk      = p.dna_goalkeeper ?? null;

  // Stats — 6 items (ikut posisi)
  let stats;
  if(p.position === 'goalkeeper'){
    stats = [
      {v: dnaTech, l:'TEC'}, {v: dnaGk ?? '—', l:'GK'},
      {v: dnaPhys, l:'PHY'}, {v: dnaMent, l:'MEN'},
      {v: dnaTact, l:'TAC'}, {v: dnaOverall, l:'OVR'},
    ];
  } else {
    stats = [
      {v: dnaTech, l:'TEC'}, {v: dnaPhys, l:'PHY'},
      {v: dnaMent, l:'MEN'}, {v: dnaTact, l:'TAC'},
      {v: dnaOverall, l:'OVR'}, {v: p.kyc_status==='verified'?'✓':'?', l:'KYC'},
    ];
  }

  // Photo
  const photoHTML = p.photo_url
    ? `<img class="card-photo" src="${p.photo_url}" alt="${p.full_name}" onerror="this.parentNode.innerHTML='<div class=card-photo-placeholder>👤</div>'">`
    : `<div class="card-photo-placeholder">👤</div>`;

  // Club logo or placeholder
  const clubLogoHTML = club?.logo_url
    ? `<img class="logo-badge" src="${club.logo_url}" alt="${club.name}" title="${club.name}">`
    : `<div class="logo-badge" style="display:flex;align-items:center;justify-content:center;font-size:.55rem;color:rgba(255,255,255,.4)">${club?.name?.substring(0,3).toUpperCase()||'—'}</div>`;

  return `
<div class="card-wrap" onclick="tiltCard(this)">
<div class="card-inner">
<div class="player-card card-${frame}">

  <div class="card-frame"></div>

  <!-- KYC badge -->
  <div class="kyc-badge">${FRAME_LABEL[frame]||frame}</div>

  <!-- TOP: DNA score kiri, logo negeri + kelab kanan -->
  <div class="card-top">
    <div class="dna-block">
      <div class="dna-score">${dnaOverall}</div>
      <div class="dna-pos">${posLbl}</div>
    </div>
    <div class="logos-block">
      <!-- Negeri (kiri dari kanan = atas) -->
      <div style="text-align:center">
        <div class="state-emoji">${stEmoji}</div>
        <div class="logo-text">${stName}</div>
      </div>
      <!-- Kelab (bawah negeri) -->
      ${clubLogoHTML}
      <div class="logo-text">${club?.name?.substring(0,10)||'Free Agent'}</div>
    </div>
  </div>

  <!-- PHOTO -->
  <div class="card-photo-wrap">
    ${photoHTML}
  </div>

  <!-- NAME + PASSPORT -->
  <div class="card-name-block">
    <div class="card-name">${p.full_name||'—'}</div>
    <div class="card-passport">${p.passport_number||'—'}</div>
  </div>

  <!-- DIVIDER -->
  <div class="card-divider"></div>

  <!-- STATS -->
  <div class="card-stats">
    ${stats.map(s=>`
      <div class="stat-item">
        <span class="stat-val">${s.v}</span>
        <span class="stat-lbl">${s.l}</span>
      </div>
    `).join('')}
  </div>

  <!-- WATERMARK -->
  <div class="card-watermark">PLAYPRO · FOOTBALL PASSPORT · MALAYSIA</div>

</div><!-- .player-card -->
</div><!-- .card-inner -->
</div><!-- .card-wrap -->

<!-- ACTIONS -->
<div class="actions">
  <button class="btn-share" onclick="shareCard('${p.passport_number}')">
    📤 Share Passport
  </button>
  <button class="btn-download" onclick="downloadCard()">
    ⬇ Save Image
  </button>
</div>

<div class="card-info">
  Passport ini milik <strong style="color:#fff">${p.full_name}</strong><br>
  <a href="/player">Tuntut Passport Kau →</a>
  &nbsp;|&nbsp;
  <a href="/">PlayPro ⚽</a>
</div>
`;
}

// ── Tilt effect ───────────────────────────────────────────────
function tiltCard(el){
  el.style.transform = 'scale(1.02)';
  setTimeout(()=> el.style.transform = '', 300);
}

// ── Share ─────────────────────────────────────────────────────
function shareCard(passportNo){
  const url = `${location.origin}/card?p=${encodeURIComponent(passportNo)}`;
  if(navigator.share){
    navigator.share({
      title: 'PlayPro Football Passport',
      text: '⚽ Tengok Football Passport aku dalam PlayPro!',
      url
    }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(()=>{
      alert('✅ Link disalin! Tampal dalam WhatsApp atau media sosial kau.');
    });
  }
}

// ── Download as image (html2canvas) ──────────────────────────
function downloadCard(){
  alert('📱 Screenshot skrin kau untuk save kad ini.\n\nFungsi auto-download akan datang dalam versi seterusnya.');
}

// ── Render not found ──────────────────────────────────────────
function renderNotFound(passportNo){
  return `
<div class="not-found">
  <h2>😕 Passport Tidak Dijumpai</h2>
  <p>Nombor passport <strong style="color:#00d4aa">${passportNo||'?'}</strong> tidak wujud dalam sistem.</p>
  <a href="/player">Tuntut Passport Kau →</a>
</div>`;
}

// ── Main ──────────────────────────────────────────────────────
async function main(){
  // Ambil passport number dari URL: /card?p=270920-05-A4K7
  const params = new URLSearchParams(location.search);
  const passportNo = params.get('p') || params.get('passport');

  if(!passportNo){
    document.getElementById('app').innerHTML = renderNotFound('');
    return;
  }

  // Load dari Supabase
  const { data, error } = await loadPlayer(passportNo);

  if(error || !data){
    document.getElementById('app').innerHTML = renderNotFound(passportNo);
    return;
  }

  document.getElementById('app').innerHTML = renderCard(data);

  // Update page title
  document.title = `${data.full_name} — PlayPro Football Passport`;
}

main();
</script>
