<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root {
  --g:    #0077B6;
  --g2:   #00B4D8;
  --g3:   #005c3e;
  --glt:  #e6f5ee;
  --gold: #f59e0b;
  --red:  #ef4444;
  --navy: #1a2744;
  --navy2:#243054;
  --r:    10px;
  --nh:   56px;  /* bottom nav */
}

/* LIGHT */
html, html.light {
  --bg:    #f2f4f7;
  --bg2:   #ffffff;
  --bg3:   #eaecf0;
  --bg4:   #dde0e7;
  --bdr:   rgba(0,0,0,.09);
  --txt:   #0d1117;
  --dim:   rgba(13,17,23,.55);
  --mute:  rgba(13,17,23,.35);
  --card:  #ffffff;
  --sh:    0 1px 4px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --ibg:   #f0f2f5;
  --ibdr:  rgba(0,0,0,.1);
  --search-bg: #f5f7fa;
  --search-bdr: #d0d5dd;
}

/* DARK */
html.dark {
  --bg:    #0d1117;
  --bg2:   #161b22;
  --bg3:   #21262d;
  --bg4:   #30363d;
  --bdr:   rgba(255,255,255,.07);
  --txt:   #e6edf3;
  --dim:   rgba(230,237,243,.55);
  --mute:  rgba(230,237,243,.3);
  --card:  #161b22;
  --sh:    0 1px 4px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --ibg:   rgba(255,255,255,.04);
  --ibdr:  rgba(255,255,255,.1);
  --search-bg: #21262d;
  --search-bdr: #30363d;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
html,body { height:100%; overflow:hidden; }
body { font-family:'Inter',system-ui,sans-serif; font-size:14px; background:var(--bg); color:var(--txt); }
::-webkit-scrollbar { width:3px; height:3px }
::-webkit-scrollbar-thumb { background:var(--g); border-radius:2px }

/* ════════════════════════════════════
   SPLASH
════════════════════════════════════ */
#splash {
  position:fixed; inset:0; z-index:9999;
  background:#060e0a; display:flex;
  flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden;
}
#splash-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.35 }
#splash-ov { position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,20,10,.4) 0%,rgba(0,10,5,.96) 100%) }
.sp-inner { position:relative; z-index:2; text-align:center }
.sp-logo-img { width:90px; height:90px; border-radius:20px; object-fit:contain; background:#000; padding:6px;
  box-shadow:0 0 0 1px rgba(0,200,100,.25), 0 0 40px rgba(0,200,100,.12); margin-bottom:1.25rem }
.sp-name { font-size:2.8rem; font-weight:900; color:#fff; letter-spacing:-.03em }
.sp-name em { color:var(--g2); font-style:normal }
.sp-sub { font-size:.72rem; color:rgba(255,255,255,.4); letter-spacing:.2em; text-transform:uppercase; margin-top:.4rem }
.sp-loader { width:140px; height:2px; background:rgba(255,255,255,.08); border-radius:1px; margin:2rem auto 0; overflow:hidden }
.sp-loader-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--g),var(--g2)); border-radius:1px; animation:load 1.8s ease forwards }
@keyframes load { to { width:100% } }
#splash.fade { opacity:0; transition:opacity .4s }

/* ════════════════════════════════════
   HEADER — 3 LAPISAN (Transfermarkt style)
════════════════════════════════════ */

/* Layer 1: Top bar — Logo + Search + Actions */
#hdr-top {
  position:fixed; top:0; left:0; right:0; z-index:300;
  height:56px; background:var(--bg2);
  border-bottom:1px solid var(--bdr);
  display:flex; align-items:center;
  padding:0 1rem; gap:.75rem;
}
.hdr-logo { display:flex; align-items:center; gap:.5rem; flex-shrink:0; cursor:pointer }
.hdr-logo-img { width:34px; height:34px; border-radius:8px; object-fit:contain; background:#000; padding:2px }
.hdr-logo-name { font-size:1.15rem; font-weight:900; color:var(--g); letter-spacing:-.03em; white-space:nowrap }

/* Search */
.hdr-search {
  flex:1; display:flex; align-items:center; gap:.5rem;
  background:var(--search-bg); border:1.5px solid var(--search-bdr);
  border-radius:8px; padding:.42rem .8rem; min-width:0;
  transition:.15s;
}
.hdr-search:focus-within { border-color:var(--g); background:var(--bg2); }
.hdr-search input {
  flex:1; border:none; outline:none; background:transparent;
  font-size:.82rem; color:var(--txt); font-family:inherit;
  min-width:0;
}
.hdr-search input::placeholder { color:var(--mute) }
.hdr-search-ic { color:var(--mute); font-size:.9rem; flex-shrink:0; cursor:pointer }

/* Right actions */
.hdr-actions { display:flex; align-items:center; gap:.4rem; flex-shrink:0 }
.hdr-ic-btn {
  width:36px; height:36px; border-radius:8px;
  background:var(--bg3); border:1px solid var(--bdr);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:.95rem; transition:.15s; position:relative;
}
.hdr-ic-btn:hover { border-color:var(--g); background:var(--glt) }
html.dark .hdr-ic-btn:hover { background:rgba(0,119,182,.1) }
.hdr-login-btn {
  height:36px; padding:0 .85rem;
  background:var(--g); color:#fff;
  border:none; border-radius:8px;
  font-size:.78rem; font-weight:700;
  cursor:pointer; transition:.15s;
  display:flex; align-items:center; gap:.35rem;
  font-family:inherit; white-space:nowrap;
}
.hdr-login-btn:hover { background:var(--g3) }
.hdr-user-chip {
  height:36px; padding:0 .75rem;
  background:var(--glt); border:1.5px solid var(--g);
  border-radius:8px; display:flex; align-items:center; gap:.4rem;
  cursor:pointer; transition:.15s;
}
html.dark .hdr-user-chip { background:rgba(0,119,182,.1) }
.hdr-av {
  width:24px; height:24px; border-radius:6px;
  background:var(--g); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:.72rem; font-weight:700;
}
.hdr-uname { font-size:.76rem; font-weight:700; color:var(--g); max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.notif-pip { position:absolute; top:5px; right:5px; width:7px; height:7px; border-radius:50%; background:var(--gold); border:1.5px solid var(--bg2) }
.lang-btn {
  height:36px; padding:0 .6rem; border-radius:8px;
  background:var(--bg3); border:1px solid var(--bdr);
  font-size:.65rem; font-weight:700; color:var(--g);
  display:flex; align-items:center; cursor:pointer; transition:.15s;
}
.lang-btn:hover { border-color:var(--g) }

/* Layer 2: Nav bar — dark navy, horizontal menu */
#hdr-nav {
  position:fixed; top:56px; left:0; right:0; z-index:299;
  height:42px; background:var(--navy);
  display:flex; align-items:stretch;
  overflow-x:auto; scrollbar-width:none;
}
#hdr-nav::-webkit-scrollbar { display:none }
.hn-item {
  flex-shrink:0; display:flex; align-items:center; padding:0 1.1rem;
  font-size:.76rem; font-weight:600; color:rgba(255,255,255,.7);
  cursor:pointer; border-bottom:2.5px solid transparent;
  transition:.15s; white-space:nowrap; letter-spacing:.01em;
}
.hn-item:hover { color:#fff; background:rgba(255,255,255,.06) }
.hn-item.on { color:#fff; border-bottom-color:var(--g2); font-weight:700 }
.hn-live {
  display:flex; align-items:center; gap:.35rem;
  padding:0 .9rem; cursor:pointer;
}
.hn-live-badge {
  background:var(--red); color:#fff;
  font-size:.58rem; font-weight:800;
  padding:.1rem .35rem; border-radius:4px; letter-spacing:.05em;
}
.hn-sep { width:1px; background:rgba(255,255,255,.1); margin:.6rem 0; flex-shrink:0 }
.hn-right { margin-left:auto; display:flex; align-items:center }
.hn-hamburger {
  width:42px; height:42px; display:flex; align-items:center;
  justify-content:center; cursor:pointer; color:rgba(255,255,255,.7);
  font-size:1.1rem; transition:.15s; flex-shrink:0;
}
.hn-hamburger:hover { color:#fff; background:rgba(255,255,255,.06) }

/* Layer 3: Breadcrumb / quick links */
#hdr-bread {
  position:fixed; top:98px; left:0; right:0; z-index:298;
  height:40px; background:var(--bg2);
  border-bottom:1px solid var(--bdr);
  display:flex; align-items:center;
  padding:0 .75rem; gap:.3rem;
  overflow-x:auto; scrollbar-width:none;
}
#hdr-bread::-webkit-scrollbar { display:none }
.hb-item {
  flex-shrink:0; display:flex; align-items:center; gap:.35rem;
  padding:.3rem .6rem; border-radius:6px;
  background:var(--bg3); border:1px solid var(--bdr);
  font-size:.68rem; font-weight:600; color:var(--dim);
  cursor:pointer; transition:.15s; white-space:nowrap;
}
.hb-item:hover { border-color:var(--g); color:var(--g); background:var(--glt) }
html.dark .hb-item:hover { background:rgba(0,119,182,.08) }
.hb-item.on { border-color:var(--g); color:var(--g); background:var(--glt); font-weight:700 }
html.dark .hb-item.on { background:rgba(0,119,182,.1) }
.hb-ic { font-size:.85rem }
.hb-arrow { color:var(--mute); font-size:.65rem; margin:0 .1rem }

/* Total header height = 56 + 42 + 40 = 138px */

/* ════════════════════════════════════
   MAIN CONTENT
════════════════════════════════════ */
#main {
  position:fixed; top:138px; left:0; right:0; bottom:var(--nh);
  overflow-y:auto; overflow-x:hidden;
}

/* ════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════ */
#bnav {
  position:fixed; bottom:0; left:0; right:0; height:var(--nh); z-index:300;
  background:var(--bg2); border-top:1px solid var(--bdr);
  display:grid; grid-template-columns:repeat(4,1fr);
}
.bn {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; cursor:pointer;
  position:relative; transition:.15s;
}
.bn::after {
  content:''; position:absolute; top:0; left:30%; right:30%;
  height:2px; background:var(--g); border-radius:0 0 3px 3px;
  opacity:0; transition:.15s;
}
.bn.on::after { opacity:1 }
.bn-ic { font-size:1.25rem; filter:grayscale(1) opacity(.4); transition:.15s }
.bn.on .bn-ic { filter:none }
.bn-lb { font-size:.57rem; font-weight:600; color:var(--mute); transition:.15s }
.bn.on .bn-lb { color:var(--g); font-weight:700 }

/* ════════════════════════════════════
   DRAWER (slide from left)
════════════════════════════════════ */
#dr-mask { position:fixed; inset:0; z-index:400; background:rgba(0,0,0,0); pointer-events:none; transition:background .25s }
#dr-mask.on { background:rgba(0,0,0,.5); pointer-events:all }
#drawer {
  position:fixed; top:0; left:0; bottom:0; width:276px; z-index:401;
  background:var(--bg2); border-right:1px solid var(--bdr);
  transform:translateX(-100%); transition:transform .27s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column; overflow:hidden;
}
#drawer.on { transform:translateX(0) }
.dr-head {
  padding:3.5rem 1.2rem 1rem;
  background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 100%);
  flex-shrink:0;
}
.dr-brand { display:flex; align-items:center; gap:.55rem; margin-bottom:1rem }
.dr-brand img { width:36px; height:36px; border-radius:8px; object-fit:contain; background:#000; padding:2px }
.dr-brand-name { font-size:1.05rem; font-weight:900; color:#fff; letter-spacing:-.02em }
.dr-user { display:flex; align-items:center; gap:.65rem }
.dr-av {
  width:40px; height:40px; border-radius:10px;
  background:linear-gradient(135deg,var(--g),var(--g3));
  display:flex; align-items:center; justify-content:center;
  font-size:.95rem; font-weight:700; color:#fff; flex-shrink:0;
}
.dr-uname { font-size:.83rem; font-weight:700; color:#fff }
.dr-urole { font-size:.65rem; color:rgba(255,255,255,.5); margin-top:2px }
.dr-body { flex:1; overflow-y:auto; padding:.4rem 0 }
.dr-grp { font-size:.57rem; font-weight:700; color:var(--mute); letter-spacing:.14em; text-transform:uppercase; padding:.65rem 1.1rem .2rem }
.dr-row {
  display:flex; align-items:center; gap:.7rem;
  padding:.65rem 1.1rem; cursor:pointer; transition:.15s;
  border-left:3px solid transparent;
}
.dr-row:hover { background:rgba(0,119,182,.06); border-left-color:rgba(0,119,182,.3) }
.dr-row.on { background:rgba(0,119,182,.08); border-left-color:var(--g) }
.dr-ic { font-size:1rem; width:20px; text-align:center; flex-shrink:0 }
.dr-tx { font-size:.81rem; font-weight:500; color:var(--txt) }
.dr-row.on .dr-tx { font-weight:700; color:var(--g) }
.dr-pill { margin-left:auto; font-size:.55rem; font-weight:700; padding:.12rem .45rem; border-radius:999px; background:var(--g); color:#fff }
.dr-foot { padding:.9rem 1.1rem; border-top:1px solid var(--bdr); flex-shrink:0 }
.dr-btn {
  display:flex; align-items:center; gap:.6rem;
  padding:.6rem .8rem; border-radius:9px; cursor:pointer;
  border:1px solid var(--bdr); transition:.15s; margin-bottom:.4rem;
}
.dr-btn:last-child { margin-bottom:0 }
.dr-btn:hover { border-color:var(--g); background:rgba(0,119,182,.05) }
.dr-btn-tx { font-size:.79rem; font-weight:600; color:var(--txt) }
.dr-btn.primary .dr-btn-tx { color:var(--g) }

/* ════════════════════════════════════
   HOME TAB
════════════════════════════════════ */
/* Stats strip (like TM "platform stats") */
.stats-strip {
  display:flex; gap:0; border-bottom:1px solid var(--bdr);
  background:var(--bg2);
}
.ss-item {
  flex:1; text-align:center; padding:.7rem .5rem;
  border-right:1px solid var(--bdr); cursor:default;
}
.ss-item:last-child { border-right:none }
.ss-val { font-size:1.1rem; font-weight:800; color:var(--g); letter-spacing:-.02em }
.ss-lbl { font-size:.58rem; color:var(--mute); font-weight:500; margin-top:1px }

/* Live match */
.section { padding:.85rem 1rem }
.section-title {
  font-size:.7rem; font-weight:700; color:var(--mute);
  letter-spacing:.1em; text-transform:uppercase; margin-bottom:.6rem;
  display:flex; align-items:center; gap:.5rem;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--bdr) }
.match-card {
  background:var(--card); border:1px solid var(--bdr);
  border-radius:var(--r); overflow:hidden; box-shadow:var(--sh);
  cursor:pointer; transition:.15s; margin-bottom:.6rem;
}
.match-card:hover { border-color:rgba(0,119,182,.25); transform:translateY(-1px) }
.mc-top {
  padding:.45rem .85rem; background:var(--navy);
  display:flex; justify-content:space-between; align-items:center;
}
.mc-league { font-size:.65rem; font-weight:600; color:rgba(255,255,255,.75) }
.mc-live-badge { display:flex; align-items:center; gap:.3rem; color:#fff; font-size:.62rem; font-weight:700 }
.mc-live-dot { width:6px; height:6px; border-radius:50%; background:var(--red); animation:ldot 1.2s ease-in-out infinite }
@keyframes ldot { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 50%{box-shadow:0 0 0 5px rgba(239,68,68,0)} }
.mc-body { padding:.85rem; display:flex; align-items:center; gap:.6rem }
.mc-team { flex:1; display:flex; flex-direction:column; align-items:center; gap:.3rem }
.mc-logo { width:44px; height:44px; border-radius:9px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:1.5rem }
.mc-name { font-size:.68rem; font-weight:700; color:var(--txt); text-align:center; line-height:1.3 }
.mc-scores { display:flex; flex-direction:column; align-items:center; gap:.25rem }
.mc-score { display:flex; align-items:center; gap:.35rem }
.mc-num { font-size:2rem; font-weight:900; color:var(--txt); min-width:26px; text-align:center; letter-spacing:-.03em }
.mc-sep { font-size:1rem; color:var(--mute) }
.mc-min { font-size:.62rem; font-weight:700; color:var(--red); background:rgba(239,68,68,.1); padding:.18rem .45rem; border-radius:5px }

/* Feed */
.feed-wrap { padding:0 1rem 1.5rem }
.feed-card {
  background:var(--card); border:1px solid var(--bdr);
  border-radius:var(--r); box-shadow:var(--sh);
  margin-bottom:.6rem; overflow:hidden; cursor:pointer;
  transition:.15s;
}
.feed-card:hover { border-color:rgba(0,119,182,.2) }
.fc-top { display:flex; align-items:center; gap:.6rem; padding:.75rem .85rem .4rem }
.fc-av {
  width:36px; height:36px; border-radius:9px;
  background:linear-gradient(135deg,var(--g),var(--g3));
  display:flex; align-items:center; justify-content:center;
  font-size:.9rem; font-weight:700; color:#fff; flex-shrink:0;
}
.fc-meta { flex:1; min-width:0 }
.fc-name { font-size:.79rem; font-weight:700; color:var(--txt) }
.fc-time { font-size:.62rem; color:var(--mute); margin-top:1px }
.fc-badge {
  font-size:.58rem; font-weight:700; padding:.12rem .45rem;
  border-radius:999px; letter-spacing:.03em; flex-shrink:0;
}
.b-liga   { background:rgba(0,119,182,.1);  color:var(--g) }
.b-kelab  { background:rgba(245,158,11,.1);color:var(--gold) }
.b-pemain { background:rgba(59,130,246,.1);color:#3b82f6 }
.fc-body { padding:.1rem .85rem .65rem; font-size:.79rem; color:var(--dim); line-height:1.6 }
.fc-body strong { color:var(--txt) }
.fc-foot { display:flex; border-top:1px solid var(--bdr) }
.fc-act {
  flex:1; padding:.52rem; text-align:center; cursor:pointer;
  font-size:.69rem; font-weight:600; color:var(--mute);
  border-right:1px solid var(--bdr); transition:.15s;
  display:flex; align-items:center; justify-content:center; gap:.3rem;
}
.fc-act:last-child { border-right:none }
.fc-act:hover { color:var(--g); background:rgba(0,119,182,.04) }

/* ════════════════════════════════════
   PROFILE TAB — REDESIGN pp2Tab
════════════════════════════════════ */

/* ── HEADER ── */
.pp2-header {
  background: linear-gradient(135deg, #03045E 0%, #023E8A 50%, #0096C7 100%);
  padding: 1.1rem 1rem .9rem; position: relative; overflow: hidden;
}
.pp2-header::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 80% 20%, rgba(0,180,216,.08) 0%, transparent 60%);
}
.pp2-top-row { display:flex; align-items:center; gap:.85rem; position:relative; z-index:1 }
.pp2-avatar-wrap { position:relative; flex-shrink:0 }
.pp2-avatar {
  width:62px; height:62px; border-radius:14px;
  background:linear-gradient(135deg,#0077B6,#00B4D8);
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; font-weight:900; color:#fff;
  border: 2px solid rgba(0,180,216,.3);
}
.pp2-jersey {
  position:absolute; bottom:-5px; right:-5px;
  width:22px; height:22px; border-radius:6px;
  background:#023E8A; border:1.5px solid rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:.58rem; font-weight:800; color:rgba(255,255,255,.85);
}

/* ═══════════════════════════════════
   PASSPORT KAD — Mini Card + Modal
═══════════════════════════════════ */
@keyframes kadFloat {
  0%,100% { transform: translateX(0) rotate(-1deg); }
  50%      { transform: translateX(4px) rotate(1deg); }
}
@keyframes kadGlowPulse {
  0%,100% { box-shadow: 0 0 8px var(--kad-glow,#9ca3af), 0 2px 12px rgba(0,0,0,.5); }
  50%      { box-shadow: 0 0 20px var(--kad-glow,#9ca3af), 0 4px 20px rgba(0,0,0,.6); }
}
@keyframes holoShimmer {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes holoSweep {
  0%   { transform: translateX(-100%) skewX(-15deg); opacity:0; }
  30%  { opacity: .6; }
  70%  { opacity: .6; }
  100% { transform: translateX(250%) skewX(-15deg); opacity:0; }
}
@keyframes kadFlip {
  0%   { transform: rotateY(0deg); }
  50%  { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}
@keyframes modalFadeIn {
  from { opacity:0; transform:scale(.88); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes starSpin {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}

/* Mini Kad dalam header passport */
.mini-kad-wrap {
  position: relative;
  flex-shrink: 0;
  cursor: pointer;
  perspective: 600px;
}
.mini-kad {
  width: 52px;
  height: 73px; /* ratio 2.5:3.5 — kad standard */
  border-radius: 7px;
  position: relative;
  overflow: hidden;
  animation: kadFloat 3s ease-in-out infinite, kadGlowPulse 2.5s ease-in-out infinite;
  transition: transform .2s;
  background: #111;
  border: 1.5px solid rgba(255,255,255,.15);
}
.mini-kad:active { transform: scale(.93); }
.mini-kad-inner {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  padding: 4px 3px 5px;
  position:relative; z-index:2;
}
.mini-kad-ovr {
  font-size: 1.35rem;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -.03em;
  color: #fff;
  text-shadow: 0 0 8px currentColor;
}
.mini-kad-init {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem; font-weight: 900; color: #fff;
  background: rgba(255,255,255,.12);
  border: 1.5px solid rgba(255,255,255,.2);
  flex-shrink: 0;
}
.mini-kad-pos {
  font-size: .38rem;
  font-weight: 800;
  letter-spacing: .1em;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
}
/* Tier overlays */
.mini-kad.tier-starter  { --kad-glow:#9ca3af; background:linear-gradient(160deg,#2d2d2d,#1a1a1a); }
.mini-kad.tier-foundation { --kad-glow:#cd7f32; background:linear-gradient(160deg,#3d2a1a,#241508); }
.mini-kad.tier-developing { --kad-glow:#0077B6; background:linear-gradient(160deg,#0d2a3d,#031422); }
.mini-kad.tier-developed  { --kad-glow:#3b82f6; background:linear-gradient(160deg,#0d1f4d,#020d2e); }
.mini-kad.tier-advanced   { --kad-glow:#8b5cf6; background:linear-gradient(160deg,#1a0d4d,#0d0626); }
.mini-kad.tier-elite {
  --kad-glow:#f9a825;
  background: linear-gradient(160deg,#1a1400,#2d2000,#1a1400);
  background-size: 200% 200%;
  animation: kadFloat 3s ease-in-out infinite, kadGlowPulse 2.5s ease-in-out infinite, holoShimmer 4s ease infinite;
}
/* Holo layer untuk ELITE */
.mini-kad.tier-elite::after {
  content:'';
  position:absolute; inset:0; z-index:1;
  background: linear-gradient(105deg,
    transparent 20%,
    rgba(249,168,37,.08) 30%,
    rgba(255,255,255,.18) 40%,
    rgba(249,168,37,.08) 50%,
    transparent 60%
  );
  background-size: 200% 100%;
  animation: holoSweep 3s ease-in-out infinite;
  border-radius: inherit;
  pointer-events: none;
}
/* Holo layer untuk ADVANCED */
.mini-kad.tier-advanced::after {
  content:'';
  position:absolute; inset:0; z-index:1;
  background: linear-gradient(105deg,
    transparent 25%,
    rgba(139,92,246,.12) 35%,
    rgba(255,255,255,.15) 45%,
    rgba(139,92,246,.08) 55%,
    transparent 65%
  );
  background-size: 200% 100%;
  animation: holoSweep 4s ease-in-out infinite;
  border-radius: inherit;
  pointer-events: none;
}
/* Jersey badge kat bawah mini kad */
.mini-kad-jersey {
  position: absolute;
  bottom: -6px; right: -6px;
  width: 20px; height: 20px;
  border-radius: 5px;
  background: #023E8A;
  border: 1.5px solid rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: .5rem; font-weight: 800; color: rgba(255,255,255,.9);
  z-index: 10;
}
/* State badge atas mini kad */
.mini-kad-state {
  position: absolute;
  top: -5px; left: -5px;
  font-size: .38rem; font-weight: 800;
  color: rgba(255,255,255,.8);
  background: rgba(0,0,0,.6);
  padding: .1rem .25rem;
  border-radius: 3px;
  letter-spacing: .06em;
  z-index: 10;
}

/* ═══════ MODAL KAD BESAR ═══════ */
#kad-modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.92);
  backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
  flex-direction: column;
  gap: .75rem;
  padding: 1rem;
}
#kad-modal-overlay.open { display:flex; }

.kad-modal-scene {
  perspective: 1000px;
  width: min(300px, 80vw);
}
.kad-modal-card {
  width: 100%;
  aspect-ratio: 2.5/3.5;
  border-radius: 18px;
  position: relative;
  transform-style: preserve-3d;
  animation: modalFadeIn .4s cubic-bezier(.22,1,.36,1) forwards;
  cursor: pointer;
  user-select: none;
}
/* Mouse tilt via JS */
.kad-modal-card.tilting {
  transition: transform .1s ease-out;
}

.kad-full-front {
  position: absolute; inset: 0;
  border-radius: 18px;
  overflow: hidden;
  backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 1.2rem 1rem;
  gap: .5rem;
}
/* Tier styles — full card */
.kad-full-front.tier-starter {
  background: linear-gradient(160deg,#2d2d2d 0%,#1a1a1a 100%);
  border: 2px solid #6b7280;
  box-shadow: 0 0 20px rgba(107,114,128,.3), 0 8px 32px rgba(0,0,0,.7);
}
.kad-full-front.tier-foundation {
  background: linear-gradient(160deg,#3d2a1a 0%,#241508 100%);
  border: 2px solid #cd7f32;
  box-shadow: 0 0 25px rgba(205,127,50,.5), 0 8px 32px rgba(0,0,0,.7);
}
.kad-full-front.tier-developing {
  background: linear-gradient(160deg,#0d2a3d 0%,#031422 100%);
  border: 2px solid #0077B6;
  box-shadow: 0 0 30px rgba(0,119,182,.6), 0 8px 32px rgba(0,0,0,.7);
}
.kad-full-front.tier-developed {
  background: linear-gradient(160deg,#0d1f4d 0%,#020d2e 100%);
  border: 2px solid #3b82f6;
  box-shadow: 0 0 35px rgba(59,130,246,.7), 0 8px 32px rgba(0,0,0,.7);
}
.kad-full-front.tier-advanced {
  background: linear-gradient(160deg,#1a0d4d 0%,#0d0626 100%);
  border: 2px solid #8b5cf6;
  box-shadow: 0 0 40px rgba(139,92,246,.8), 0 8px 32px rgba(0,0,0,.7);
}
.kad-full-front.tier-elite {
  background: linear-gradient(160deg,#1a1400 0%,#2d2000 50%,#1a1400 100%);
  border: 2px solid #f9a825;
  box-shadow: 0 0 50px rgba(249,168,37,.9), 0 0 100px rgba(249,168,37,.3), 0 8px 32px rgba(0,0,0,.8);
}
/* Holo sweep atas full card */
.kad-full-front::after {
  content:''; position:absolute; inset:0;
  border-radius: inherit; pointer-events:none; z-index:5;
  opacity:0;
}
.kad-full-front.tier-elite::after {
  background: linear-gradient(115deg,
    transparent 0%,
    rgba(255,220,100,.04) 20%,
    rgba(255,255,255,.2) 35%,
    rgba(249,168,37,.12) 50%,
    rgba(255,255,255,.08) 65%,
    transparent 80%
  );
  background-size: 200% 200%;
  animation: holoShimmer 3s ease infinite;
  opacity:1;
}
.kad-full-front.tier-advanced::after {
  background: linear-gradient(115deg,
    transparent 0%,
    rgba(139,92,246,.06) 25%,
    rgba(255,255,255,.15) 40%,
    rgba(139,92,246,.06) 55%,
    transparent 75%
  );
  background-size: 200% 200%;
  animation: holoShimmer 4s ease infinite;
  opacity:1;
}

/* Header area kad besar */
.kad-full-top {
  width:100%; display:flex; align-items:center;
  justify-content:space-between; position:relative; z-index:2;
}
.kad-full-ovr {
  font-size: 2.4rem; font-weight: 900;
  line-height:1; letter-spacing:-.04em;
  color: #fff; text-shadow: 0 0 20px currentColor;
}
.kad-full-tier {
  font-size: .5rem; font-weight: 800;
  letter-spacing: .15em; text-transform: uppercase;
  color: rgba(255,255,255,.6);
  margin-top:.15rem;
}
.kad-full-logo {
  font-size: .5rem; font-weight: 900;
  letter-spacing: .1em; color: rgba(255,255,255,.4);
  text-align: right;
}
/* Avatar bulat tengah */
.kad-full-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 900; color: #fff;
  background: rgba(255,255,255,.08);
  border: 3px solid rgba(255,255,255,.2);
  position: relative; z-index:2;
  flex-shrink: 0;
}
.kad-full-name {
  font-size: .88rem; font-weight: 900;
  color: #fff; text-align: center;
  letter-spacing: .02em;
  position: relative; z-index:2;
  text-shadow: 0 1px 6px rgba(0,0,0,.5);
}
.kad-full-pos {
  font-size: .6rem; font-weight: 700;
  color: rgba(255,255,255,.55);
  letter-spacing: .08em; text-transform: uppercase;
  position: relative; z-index:2;
}
/* Stats grid bawah */
.kad-full-stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: .3rem .5rem;
  width: 100%;
  background: rgba(0,0,0,.3);
  border-radius: 10px;
  padding: .55rem .4rem;
  position: relative; z-index:2;
  margin-top: auto;
}
.kad-stat-item {
  display: flex; flex-direction: column;
  align-items: center; gap:.05rem;
}
.kad-stat-val {
  font-size: 1.1rem; font-weight: 900;
  color: #fff; line-height:1;
  letter-spacing: -.02em;
}
.kad-stat-lbl {
  font-size: .42rem; font-weight: 700;
  color: rgba(255,255,255,.45);
  letter-spacing: .08em;
}
/* Passport number kat bawah */
.kad-full-fpno {
  font-size: .42rem; font-family: monospace;
  color: rgba(255,255,255,.3);
  letter-spacing: .06em;
  position: relative; z-index:2;
}
/* Stars row */
.kad-stars { display:flex; gap:.15rem; position:relative; z-index:2; }
.kad-star { font-size:.65rem; }

/* Butang bawah modal */
.kad-modal-actions {
  display: flex; gap:.75rem;
  justify-content: center;
  flex-wrap: wrap;
}
.kad-btn {
  padding: .55rem 1.1rem;
  border-radius: 10px;
  border: none; cursor: pointer;
  font-size: .75rem; font-weight: 800;
  font-family: inherit;
  display: flex; align-items: center; gap:.4rem;
  transition: transform .15s, opacity .15s;
}
.kad-btn:active { transform: scale(.95); opacity:.85; }
.kad-btn-share { background: #25D366; color: #fff; }
.kad-btn-print { background: rgba(255,255,255,.1); color: #fff; border:1px solid rgba(255,255,255,.2); }
.kad-btn-close { background: rgba(255,255,255,.07); color: rgba(255,255,255,.6); border:1px solid rgba(255,255,255,.1); }
.pp2-info { flex:1; min-width:0 }
.pp2-name-row { display:flex; align-items:center; gap:.5rem; margin-bottom:.2rem; flex-wrap:wrap }
.pp2-name { font-size:1.05rem; font-weight:800; color:#fff; letter-spacing:-.02em }
.pp2-active { background:#0077B6; color:#fff; font-size:.56rem; font-weight:700; padding:.1rem .4rem; border-radius:999px; letter-spacing:.05em }
.pp2-pos { font-size:.7rem; font-weight:700; margin-bottom:.25rem }
.pp2-pos-code { background:rgba(0,180,216,.15); border:1px solid rgba(0,180,216,.25); padding:.1rem .4rem; border-radius:5px; color:rgba(255,255,255,.9); margin-right:.3rem }
.pp2-pos-full { color:rgba(255,255,255,.45); font-weight:400; font-size:.65rem }
.pp2-meta { display:flex; flex-wrap:wrap; gap:.25rem .65rem; font-size:.62rem; color:rgba(255,255,255,.5) }
.pp2-dna-circle {
  width:52px; height:52px; border-radius:50%; flex-shrink:0;
  border:3px solid #00B4D8; background:rgba(0,0,0,.3);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.pp2-dna-num { font-size:1.15rem; font-weight:900; color:#00B4D8; line-height:1; letter-spacing:-.04em }
.pp2-dna-lbl { font-size:.42rem; font-weight:700; color:rgba(255,255,255,.45); letter-spacing:.08em; text-transform:uppercase }
.pp2-contract {
  margin-top:.6rem; padding:.4rem .75rem; position:relative; z-index:1;
  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
  border-radius:8px; display:flex; align-items:center; gap:.5rem;
}
.pp2-contract-label { font-size:.6rem; color:rgba(255,255,255,.4); flex-shrink:0 }
.pp2-contract-val { font-size:.7rem; font-weight:700; color:#f59e0b }

/* ── TABS ── */
.pp2-tabs {
  display:flex; background:var(--bg2); border-bottom:2px solid var(--bdr);
  overflow-x:auto; scrollbar-width:none; position:sticky; top:0; z-index:20;
}
.pp2-tabs::-webkit-scrollbar { display:none }
.pp2-tab {
  flex-shrink:0; padding:.62rem .85rem; font-size:.71rem; font-weight:600;
  color:var(--mute); cursor:pointer; border-bottom:2.5px solid transparent;
  margin-bottom:-2px; transition:.15s; white-space:nowrap;
}
.pp2-tab.on { color:var(--g); border-bottom-color:var(--g); font-weight:700 }

  padding:.9rem 1rem
